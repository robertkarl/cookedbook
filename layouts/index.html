{{ define "main" }}
<div class="hero">
  <div class="hero-actions">
    <a href="{{ "/recipes/" | relURL }}" class="btn btn-primary">Browse Recipes</a>
    <a href="{{ "/search/" | relURL }}" class="btn btn-secondary">Search</a>
  </div>
</div>
<div class="recipe-list">
  {{ range (where .Site.RegularPages "Section" "recipes").ByTitle }}
  <a href="{{ .RelPermalink }}" class="recipe-card">
    <h2>{{ .Title }}</h2>
    {{ with .Params.summary }}<p>{{ . }}</p>{{ end }}
    <div class="card-meta">
      {{ with .Params.prep_time }}<span>Prep: {{ . }}</span>{{ end }}
      {{ with .Params.cook_time }}<span>Cook: {{ . }}</span>{{ end }}
    </div>
  </a>
  {{ end }}
</div>
{{ end }}
